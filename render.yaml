# Render blueprint for the Synapse/Profound backend.
# Create the service via Render → "New" → "Blueprint" and point it at this repo,
# then fill in the secret env vars (OPENAI_API_KEY, TAVILY_API_KEY, CORS_ORIGINS)
# in the dashboard — they are intentionally not stored here.
services:
  - type: web
    name: vc-brain-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      # Comma-separated allowed origins for CORS — set to the Cloudflare Pages URL,
      # e.g. https://vc-brain.pages.dev
      - key: CORS_ORIGINS
        sync: false
